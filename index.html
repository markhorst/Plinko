<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J1 SAAS Migration Engine</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>
    <div class="game-container">
        <div id="canvas-container"></div>
        
        <div id="dom-layer"></div>

        <div id="drop-zone" class="drop-zone">
            <span class="drop-text">Drag a coin up here</span>
        </div>

        <div class="buckets">
            <div class="bucket saas-bucket">J1 SAAS SQL</div>
            <div class="bucket non-saas-bucket">Non-SAAS Server</div>
        </div>
    </div>

    <div id="qa-modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="question-text">Loading...</h2>
            <div id="note-text" class="hidden"></div>
            <div class="btn-group" id="btn-group">
                <button onclick="submitAnswer('yes')" class="btn-yes">Yes</button>
                <button onclick="submitAnswer('no')" class="btn-no">No</button>
            </div>
            <div id="result-text" class="hidden"></div>
        </div>
    </div>

    <script src="questions.js"></script>
    <script src="game.js"></script>
</body>
</html>
